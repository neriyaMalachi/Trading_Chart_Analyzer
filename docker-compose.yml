version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: tca-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tca
      POSTGRES_PASSWORD: tca
      POSTGRES_DB: tca
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tca -d tca']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tca-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: tcaminio
      MINIO_ROOT_PASSWORD: tcaminiopass
    command: server /data --console-address ':9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
